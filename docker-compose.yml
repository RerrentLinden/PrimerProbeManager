services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend

volumes:
  db_data:
